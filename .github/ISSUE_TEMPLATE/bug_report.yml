name: Bug Report
description: Report a problem or unexpected behavior
title: "[Bug] "
labels: ["bug"]

body:
  - type: textarea
    attributes:
      label: 🐛 Problem
      description: What happened?
      placeholder: Describe the issue clearly
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🔁 Steps to Reproduce
      description: How can we reproduce it?
      placeholder: Step 1, Step 2...
  
  - type: textarea
    attributes:
      label: 📸 Screenshots
      description: Add screenshots if possible

  - type: input
    attributes:
      label: Blender Version
      placeholder: e.g. 3.6
