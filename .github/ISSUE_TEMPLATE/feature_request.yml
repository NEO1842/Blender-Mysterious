name: Feature Request
description: Suggest an idea or improvement
title: "[Feature] "
labels: ["enhancement"]

body:
  - type: textarea
    attributes:
      label: 💡 Idea
      description: What do you want to add?
    validations:
      required: true

  - type: textarea
    attributes:
      label: 🎯 Purpose
      description: Why is this useful?

  - type: textarea
    attributes:
      label: 🛠️ Possible Solution
      description: How could it be implemented?
